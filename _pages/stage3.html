<!-- Lock screen -->

    <form id="pw-form" onsubmit="return checkPassword()">
      <input id="pw-input" type="password" placeholder="Enter password" autofocus autocomplete="off" />

    </form>

  </div>

<script>
(function () {
  // SHA-256 hash of the password — change by updating the hash below.
  // Default password: "stage3"
  var HASH = "8c01e8c58bff1f4af498b45571c16e5e53eaf9815c4b68a24a65bfe1a1225b1f";

  // Check if already authenticated this session
  if (sessionStorage.getItem("s3auth") === HASH) {
    unlock();
  }

  window.checkPassword = function () {
    var pw = document.getElementById("pw-input").value;
    crypto.subtle.digest("SHA-256", new TextEncoder().encode(pw)).then(function (buf) {
      var hash = Array.from(new Uint8Array(buf)).map(function (b) {
        return b.toString(16).padStart(2, "0");
      }).join("");
      if (hash === HASH) {
        sessionStorage.setItem("s3auth", HASH);
        unlock();
      } else {
        document.getElementById("pw-error").textContent = "Incorrect password.";
        document.getElementById("pw-input").value = "";
        document.getElementById("pw-input").focus();
      }
    });
    return false;
  };

  function unlock() {
    document.getElementById("lock-screen").style.display = "none";
    document.getElementById("protected-content").style.display = "block";
  }
})();
</script>
